<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? | 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="theme-toggle" class="theme-btn" aria-label="다크모드 토글">🌙</button>
            <h1>오늘 뭐 먹지?</h1>
            <p>메뉴를 고민 중인가요? 후보를 입력하면 골라드릴게요.</p>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="menu-input" placeholder="메뉴를 입력하세요 (예: 김치찌개)" autofocus>
                <button id="add-btn">추가</button>
            </div>

            <div class="list-container">
                <ul id="menu-list"></ul>
            </div>

            <div class="action-group">
                <button id="recommend-btn" class="primary-btn">메뉴 추천받기</button>
                <button id="reset-btn" class="secondary-btn">초기화</button>
            </div>

            <div id="result-overlay" class="hidden">
                <div class="result-content">
                    <h2>오늘의 추천 메뉴!</h2>
                    <div id="selected-menu"></div>
                    <button id="close-result">다시 고르기</button>
                </div>
            </div>
        </main>

        <footer>
            <button id="contact-toggle" class="link-btn">제휴 문의하기</button>
            
            <!-- Disqus Comments Section -->
            <div id="comments-section">
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://builddev.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </div>
        </footer>

        <!-- Partnership Form Section -->
        <div id="contact-section" class="hidden">
            <div class="contact-content">
                <button id="close-contact" class="close-btn">&times;</button>
                <h2>제휴 문의</h2>
                <p>함께 성장할 파트너를 기다립니다.</p>
                <form action="https://formspree.io/f/xpqkkbja" method="POST">
                    <div class="form-group">
                        <label for="company">업체명</label>
                        <input type="text" name="company" id="company" required placeholder="업체명을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" name="email" id="email" required placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea name="message" id="message" required placeholder="문의하실 내용을 입력해주세요"></textarea>
                    </div>
                    <button type="submit" class="primary-btn">문의 보내기</button>
                </form>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
